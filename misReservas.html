<!DOCTYPE html>
<html lang="es">
    <head>
        <title>Mis Reservas</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header class="cabecera">
            <p> Aquí va la barra de navegación</p>
        </header>
        <section class="mis-reservas">
            <div class="">
                <input type="radio" name="filtro-pistas" id="filtro-todas" checked class="filtro-oculto">
                <input type="radio" name="filtro-pistas" id="filtro-interior" class="filtro-oculto">
                <input type="radio" name="filtro-pistas" id="filtro-techo" class="filtro-oculto">

                <div class="menu-filtros">
                    <label for="filtro-todas" class="btn-filtro">Todas</label>
                    <label for="filtro-interior" class="btn-filtro">Reservas anteriores</label>
                    <label for="filtro-techo" class="btn-filtro">Reservas actuales</label>
                </div>
            </div>

            <article class="card-reserva">
                <h3>Reserva #743205</h3>
                <span class="fecha">Lun, 13 Abril 10:30</span>
                <span class="estado">Pagado</span>
                <button type="button" class="btn-pagado" disabled> Pagar </button>
                <button type="button" class="btn-cancelar">Cancelar Reserva</button>
            </article>
        </section>
    </body>
</html>
