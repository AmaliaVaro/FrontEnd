<!DOCTYPE html>
<html lang="es">
    <head>
        <title>Mis Reservas</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header class="cabecera">
            <p> Aquí va la barra de navegación</p>
            <h2>Mis Reservas</h2>
            <p>Gestiona tus próximos partidos y revisa tu historial.</p>
        </header>
        <section class="mis-reservas">
            <div class="">
                <input type="radio" name="filtro-pistas" id="filtro-todas" checked class="filtro-oculto">
                <input type="radio" name="filtro-pistas" id="filtro-anteriores" class="filtro-oculto">
                <input type="radio" name="filtro-pistas" id="filtro-actuales" class="filtro-oculto">

                <div class="menu-filtros">
                    <label for="filtro-todas" class="btn-filtro">Todas</label>
                    <label for="filtro-anteriores" class="btn-filtro">Reservas anteriores</label>
                    <label for="filtro-actuales" class="btn-filtro">Reservas actuales</label>
                </div>
            </div>

            <div class="lista-reservas">
                <article class="card-reserva tipo-actual">
                    <div class="reserva-info">
                        <h3>Reserva #743205</h3>
                        <span class="fecha">Lun, 13 Abril 10:30</span>
                        <span class="pista">Pista 02 - Exterior con techo</span>
                    </div>
                    <div class="reserva-estado">
                        <span class="estado pendiente">Pendiente de pago</span>
                        <button type="button" class="btn-accion pagar"> Pagar </button>
                        <button type="button" class="btn-cancelar">Cancelar Reserva</button>
                    </div>
                </article>

                <article class="card-reserva tipo-anterior">
                    <div class="reserva-info">
                        <h3>Reserva #151743</h3>
                        <span class="fecha">Jue, 23 Abril 21:00</span>
                        <span class="pista">Pista 01 - Interior</span>
                    </div>
                    <div class="reserva-estado">
                        <span class="estado finalizado">Finalizado</span>
                        <button type="button" class="btn-cancelar">Cancelar Reserva</button>
                    </div>
                </article>
            </div>
        </section>
    </body>
</html>
