<!DOCTYPE html>

<html lang="es">

<head>
    <title>Perfil</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="Signin-container">
        <h2>Crear cuenta</h2>
        
        <form id="SigninForm">
            
            <div class="form-group">
                <label for="Nombre">Tu nombre</label>
                <input type="Nombre" id="Nombre" name="Nombre" placeholder="Amaya" required>
            </div>

            <div class="form-group">
                <label for="Apellidos">Tus apellidos</label>
                <input type="Apellidos" id="Apellidos" name="Apellidos" placeholder="Baro Marín" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="TuCorreoAqui@email.com" required>
            </div>

            <div class="form-group">
                <label for="telefono">Telefono</label>
                <input type="telefono" id="telefono" name="telefono" placeholder="+34 648 116 789" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="**********" required>
            </div>

            <div class="form-group">
                <label for="password">Repite tu contraseña</label>
                <input type="password" id="password" name="password" placeholder="**********" required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <p class="login-footer">¿Ya tienes cuenta? <a href=#>Inicia sesión</a></p>
    </div>
</body>
